<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60" role="img" aria-label="FAVEL Logo">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CC44CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9933CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC88EE;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo Mark: stylized F shape -->
  <rect x="4" y="4" width="42" height="52" rx="10" ry="10" fill="url(#logoGrad)" filter="url(#glow)"/>
  <!-- F letter mark -->
  <rect x="13" y="13" width="24" height="4" rx="2" fill="white"/>
  <rect x="13" y="13" width="4" height="34" rx="2" fill="white"/>
  <rect x="13" y="26" width="18" height="4" rx="2" fill="white"/>
  
  <!-- Brand name FAVEL -->
  <text x="56" y="38" font-family="'Playfair Display', Georgia, serif" font-size="26" font-weight="900" letter-spacing="-0.5" fill="url(#textGrad)">FAVEL</text>
</svg>
